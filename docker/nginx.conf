map $http_x_forwarded_host $ai_localbase_forwarded_host {
    default $http_x_forwarded_host;
    "" $http_host;
}

map $http_x_forwarded_proto $ai_localbase_forwarded_proto {
    default $http_x_forwarded_proto;
    "" $scheme;
}

server {
    listen 4173;
    server_name _;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $ai_localbase_forwarded_host;
        proxy_set_header X-Forwarded-Proto $ai_localbase_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    location /v1 {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $ai_localbase_forwarded_host;
        proxy_set_header X-Forwarded-Proto $ai_localbase_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    location ~ ^/(?:.+/)?mcp(?:/.*)?$ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $ai_localbase_forwarded_host;
        proxy_set_header X-Forwarded-Proto $ai_localbase_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
    }

    location /upload {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $ai_localbase_forwarded_host;
        proxy_set_header X-Forwarded-Proto $ai_localbase_forwarded_proto;
    }

    location /health {
        proxy_pass http://backend:8080;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $ai_localbase_forwarded_host;
        proxy_set_header X-Forwarded-Proto $ai_localbase_forwarded_proto;
    }
}
