services:
  qdrant:
    image: qdrant/qdrant:v1.13.4
    container_name: ai-localbase-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_BIND_ADDRESS:-127.0.0.1}:${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_BIND_ADDRESS:-127.0.0.1}:${QDRANT_GRPC_PORT:-6334}:6334"
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - ${QDRANT_STORAGE_PATH:-./qdrant_storage}:/qdrant/storage
